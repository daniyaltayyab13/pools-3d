<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" content="#07111F" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Pools 3D</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #123456 0%, #07111f 42%, #030712 100%);
        color: white;
        font-family: Arial, sans-serif;
      }

      .card {
        width: min(460px, calc(100vw - 32px));
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        padding: 28px;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        color: #a8bccd;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 12px;
        border-radius: 999px;
        background: #f5a524;
        color: #07111f;
        padding: 12px 18px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You're offline</h1>
      <p>
        Pools 3D Studio is installed, but this page was not available in the cache.
        Reconnect to the internet and open the studio again.
      </p>
      <a href="/studio">Try Studio Again</a>
    </main>
  </body>
</html>
